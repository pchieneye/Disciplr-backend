name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: disciplr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d disciplr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/disciplr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Apply migrations
        run: npm run migrate:latest

      - name: Migration status
        run: npm run migrate:status

      - name: Test
        run: npm test
        env:
          NODE_ENV: test

  contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions/setup-rust@v1
        with:
          rust-version: stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/accountability_vault/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/accountability_vault/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-contract
        run: |
          cargo install cargo-contract --locked
          rustup target add wasm32-unknown-unknown

      - name: Build Soroban contract
        run: cargo contract build --manifest-path contracts/accountability_vault/Cargo.toml --release

      - name: Run Soroban contract tests
        run: cargo test --manifest-path contracts/accountability_vault/Cargo.toml --verbose
