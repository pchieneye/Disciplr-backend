name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: disciplr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d disciplr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/disciplr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Apply migrations
        run: npm run migrate:latest

      - name: Migration status
        run: npm run migrate:status
      - name: Assert no pending migrations
        run: |
          node -e "const {execSync} = require('child_process'); const out = execSync('npx knex migrate:status --knexfile knexfile.cjs', {encoding: 'utf8'}); if (/not yet run|Pending|down|Migrations pending/i.test(out)) { console.error('Pending migrations detected:\n' + out); process.exit(1); } console.log('No pending migrations');"
      - name: Assert migration status is clean
        run: |
          npm run migrate:status | tee /tmp/migrate-status.txt
          grep -q 'Found 0 Pending Migration file/files.' /tmp/migrate-status.txt

      - name: Test
        run: npm test
        env:
          NODE_ENV: test

      - name: Test
        run: npm test
        env:
          NODE_ENV: test
