name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts-fuzz:
    name: Fuzz create_vault (30 s)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: fuzz-${{ hashFiles('contracts/accountability_vault/fuzz/Cargo.toml') }}
          restore-keys: fuzz-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz harness (capped at 30 s)
        working-directory: contracts/accountability_vault
        run: cargo fuzz run create_vault -- -max_total_time=30

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: contracts/accountability_vault/fuzz/artifacts/

  test-and-migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: disciplr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d disciplr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/disciplr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Apply migrations
        run: npm run migrate:latest

      - name: Migration status
        run: npm run migrate:status

      - name: Test
        run: npm test
        env:
          NODE_ENV: test

  cargo-audit-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for contracts changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            contracts:
              - 'contracts/**'

      - name: Install Rust
        if: steps.changes.outputs.contracts == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        if: steps.changes.outputs.contracts == 'true'
        run: cargo install cargo-audit

      - name: Run cargo audit
        if: steps.changes.outputs.contracts == 'true'
        run: cd contracts && cargo audit
