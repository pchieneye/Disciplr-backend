name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: disciplr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d disciplr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/disciplr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Apply migrations
        run: npm run migrate:latest

      - name: Migration status
        run: npm run migrate:status

      - name: Test
        run: npm test
        env:
          NODE_ENV: test

  snapshot-check:
    name: Ledger Snapshot Stability
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/accountability_vault/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/accountability_vault/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check snapshot stability
        working-directory: contracts/accountability_vault
        run: bash scripts/check_snapshots.sh
